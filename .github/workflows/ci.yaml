name: Continuous deployment

on:
  push:
    branches:
      - main

permissions:
  contents: write

jobs:
  lint:
    runs-on: ubuntu-22.04
    steps:
      - name: Checkout 🛎️
        uses: actions/checkout@v6

      - name: Use pnpm 🗜️
        uses: pnpm/action-setup@v3
        with:
          version: 10.32.1
          run_install: false

      - name: Use Node.js 🐢
        uses: actions/setup-node@v4
        with:
          node-version: 22.22.1
          cache: 'pnpm'

      - name: Install dependencies ⚙️
        run: pnpm install --frozen-lockfile

      - name: Lint 👕
        run: pnpm lint

  deploy:
    needs: [lint]
    runs-on: ubuntu-22.04
    steps:
      - name: Checkout 🛎️
        uses: actions/checkout@v6

      - name: Use pnpm 🗜️
        uses: pnpm/action-setup@v3
        with:
          version: 10.32.1
          run_install: false

      - name: Use Node.js 🐢
        uses: actions/setup-node@v4
        with:
          node-version: 22.22.1
          cache: 'pnpm'

      - name: Install and Build 🔧
        run: |
          pnpm install --frozen-lockfile
          pnpm build

      - name: Disable Jekyll ⛔
        run: touch dist/.nojekyll

      - name: Deploy 🚀
        uses: JamesIves/github-pages-deploy-action@v4
        with:
          folder: dist
